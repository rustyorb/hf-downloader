<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HF Downloader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🤗</span>
      <h1>HF Downloader</h1>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="discover">Discover</button>
      <button class="tab" data-tab="browse">Browse</button>
      <button class="tab" data-tab="queue">Queue <span id="queueBadge" class="badge">0</span></button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>
    <button id="themeToggle" class="icon-btn" title="Toggle theme">🌓</button>
  </header>

  <main>
    <!-- DISCOVER -->
    <section id="discover" class="panel active">
      <div class="search-bar">
        <div class="seg" id="discoverSeg">
          <button class="seg-btn active" data-dtype="dataset">Datasets</button>
          <button class="seg-btn" data-dtype="model">Models</button>
        </div>
        <select id="discoverSort">
          <option value="trending">🔥 Trending</option>
          <option value="downloads">Most downloads</option>
          <option value="likes">Most likes</option>
          <option value="lastModified">Recently updated</option>
        </select>
        <button id="discoverRefresh" class="primary">Refresh</button>
      </div>
      <h2 id="discoverHeading" class="disc-h">🔥 Trending</h2>
      <div id="discoverGrid" class="results"></div>

      <div class="row-between" style="margin-top:26px;">
        <h2>Collections</h2>
        <select id="collSort">
          <option value="trending">🔥 Trending</option>
          <option value="upvotes">Most upvoted</option>
        </select>
      </div>
      <div id="collectionsList" class="collections"></div>
    </section>

    <!-- BROWSE -->
    <section id="browse" class="panel">
      <div class="search-bar">
        <div class="seg">
          <button class="seg-btn active" data-rtype="model">Models</button>
          <button class="seg-btn" data-rtype="dataset">Datasets</button>
          <button class="seg-btn" data-rtype="collection">Collections</button>
        </div>
        <input id="searchInput" type="text" placeholder="Search by name, e.g. llama, bert, squad…" />
        <select id="sortSelect">
          <option value="downloads">Most downloads</option>
          <option value="likes">Most likes</option>
          <option value="lastModified">Recently updated</option>
        </select>
        <button id="searchBtn" class="primary">Search</button>
      </div>
      <div class="quick-open">
        <input id="directRepo" type="text" placeholder="…or paste a repo id: owner/name" />
        <input id="directRev" type="text" class="rev" placeholder="revision (optional)" />
        <button id="openBtn">Open</button>
      </div>
      <div id="results" class="results"></div>
    </section>

    <!-- QUEUE -->
    <section id="queue" class="panel">
      <h2>Download Queue</h2>
      <div id="queueList" class="queue-list"></div>
    </section>

    <!-- HISTORY -->
    <section id="history" class="panel">
      <div class="row-between">
        <h2>History</h2>
        <button id="clearHistory" class="danger ghost">Clear</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>

    <!-- SETTINGS -->
    <section id="settings" class="panel">
      <h2>Settings</h2>
      <div class="form">
        <label>Access Token <span class="hint">(for gated/private repos)</span></label>
        <div class="token-row">
          <input id="tokenInput" type="password" placeholder="hf_…" />
          <span id="tokenStatus" class="pill"></span>
        </div>

        <label>Download Directory</label>
        <input id="downloadDir" type="text" />

        <label>Concurrent Downloads</label>
        <input id="maxWorkers" type="number" min="1" max="8" />

        <div id="diskInfo" class="disk"></div>

        <button id="saveSettings" class="primary">Save Settings</button>
        <span id="settingsSaved" class="saved-msg"></span>
      </div>
    </section>
  </main>

  <!-- REPO DETAIL MODAL -->
  <div id="repoModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2 id="repoTitle"></h2>
          <div id="repoMeta" class="repo-meta"></div>
        </div>
        <button id="closeModal" class="icon-btn">✕</button>
      </div>
      <div class="modal-toolbar">
        <label>Revision:
          <select id="revisionSelect"></select>
        </label>
        <input id="fileFilter" type="text" placeholder="Filter files (e.g. .safetensors)" />
        <label class="chk"><input type="checkbox" id="selectAll" /> Select all</label>
        <span id="selSummary" class="sel-summary"></span>
        <button id="downloadSelected" class="primary">Download Selected</button>
      </div>
      <div id="datasetPreview" class="ds-preview hidden"></div>
      <div id="fileList" class="file-list"></div>
      <details class="readme">
        <summary>README</summary>
        <pre id="readmeContent"></pre>
      </details>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
